<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <title>GitHub Issues Tracker</title>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <!--Login Page-->
    <div id="loginPage" class="bg-white shadow-lg rounded-lg p-8 w-96">
        <div class="flex flex-col items-center mb-6">
            <img src="github-logo.png" alt="logo" class="w-12 h-12 mb-2">
            <h1 class="text-2xl font-bold text-gray-800">
                GitHub Issues Tracker

            </h1>

            <p class="text-gray-500 text-sm mt-1">
                Sign in to continue
            </p>
        </div>

        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input id="username" type="text" placeholder="Enter Username" class="w-full border border-gray-300 rounded-md px-3 py-2 mb-4" />
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input id="password" type="password" placeholder="Enter Password" class="w-full border border-gray-300 rounded-md px-3 py-2 mb-4" />

        <button onclick="login()" class="w-full bg-blue-600 text-white py-2.5 rounded-md hover:bg-blue-700">Sign In
        </button>

        <p class="text-sm text-green-600 mt-4 text-center">
            Demo: admin / admin123
        </p>

    </div>

    <!--Dashboard-->
    <div id="mainPage" class="hidden p-6 w-full max-w-7xl">

        <!--Navbar-->
        <div class="flex justify-between items-center mb-6">
            <div class="flex gap-2 mb-6">
                <img src="github-logo.png" alt="logo" class=" bg-gray-200 p-1 rounded-full w-10 h-10">
                <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
            </div>

            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-green-400"></i>
                <input id="searchInput" type="text" placeholder="search issues"
                    class="text-green-400 border rounded border-gray-400 pl-8 pr-3 py-2 w-64" />
                <button onclick="searchIssues()" class="bg-green-600 text-white px-4 py-2 rounded shadow shadow-green-300
                hover:bg-green-700 hover:shadow-green-400 transition">Search</button>
            </div>

        </div>

        <!--Tab-->

        <div class="flex gap-3 mb-6">
            <button data-type="all"
                class="filter-btn px-4 py-1 rounded border border-blue-500 text-blue-500 hover:bg-blue-100 transition"
                onclick="loadIssues('all', this)">All</button>
            <button data-type="open"
                class="filter-btn px-4 py-1 rounded border border-green-500 text-green-500 hover:bg-green-100 transition"
                onclick="loadIssues('open', this)">Open</button>
            <button data-type="closed"
                class="filter-btn px-4 py-1 rounded border border-purple-500 text-purple-500 hover:bg-purple-100 transition"
                onclick="loadIssues('closed', this)">Closed</button>
        </div>

        <!-- Counter Info-->
        <div class="mx-auto px-4 mt-6 mb-6 bg-white shadow rounded-lg p-4 flex items-center
            justify-between">
            <div class="flex items-center gap-3">
                <img src="aperture.png" alt="issues" class=" bg-gray-200 p-1 rounded-full w-10 h-10">

                <div>

                    <div class="flex items-center gap-2">
                        <span id="issueCount" class="text-2xl font-bold text-indigo-600"></span>
                        <h2 id="issueTitle" class="text-lg font-semibold">Issues</h2>
                    </div>

                    <p class="text-sm text-gray-500 mt-0.5">Track and Manage Your Project Issues</p>

                </div>

            </div>
            <!-- Right Side Indicators -->
            <div class="flex items-center gap-2 text-sm">
                <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                <p class="text-sm text-gray-500">Open</p>
                <span class="w-2 h-2 bg-purple-500 rounded-full"></span>
                <p class="text-sm text-gray-500">Closed</p>
            </div>
        </div>

        <!--Issues Grid-->
        <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>

    </div>

    <!--Issues Modal-->

    <div id="issueModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">

        <div id="modalCard" class="bg-white w-[540px] rounded-lg shadow-xl p-6">

            <!-- title -->
            <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>

            <!-- status -->
            <div class="flex items-center text-sm text-gray-500 mb-3">

                <span id="modalStatus" class="mr-5"></span>

                <span class="mx-2">•</span>
                <span id="modalAuthor"></span>

                <span class="mx-2">•</span>
                <span id="modalDate"></span>

            </div>

            <!-- tags -->
            <div id="modalTags" class="flex gap-2 mb-3"></div>

            <!-- description -->
            <p id="modalDescription" class="text-gray-700 mb-4"></p>

            <!-- assignee + priority -->
            <div class="grid grid-cols-2 bg-gray-100 rounded-lg p-4 mt-4">

                <!-- Assignee -->
                <div class="text-sm text-gray-700 mb-1">
                    <div class="font-semibold">Assignee</div>
                    <div id="modalAssignee"></div>
                </div>

                <!-- Priority -->
                <div class="flex flex-col items-center">
                    <div class="text-sm font-semibold text-gray-800 mb-1">Priority</div>
                    <span id="modalPriority"></span>
                </div>

            </div>

            <!-- close -->
            <div class="flex justify-end mt-6">
                <button onclick="closeModal()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                    Close
                </button>
            </div>

        </div>

    </div>

    <div id="spinner" class="fixed inset-0 flex items-center justify-center z-50">

        <div class="animate-spin rounded-full h-12 w-12 border-4 border-purple-600 border-t-transparent"></div>

    </div>


    <script src="script.js"></script>

</body>

</html>
