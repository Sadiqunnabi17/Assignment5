<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    
    <title>Assignment5</title>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify justify-center">
    
<div class="bg-white shadow-lg rounded-lg p-8 w-96">

    <h1 class="text-2xl font-bold text-center mb-2">
        GitHub Issues Tracker
    </h1>

    <p class="text-gray-500 text-center mb-6">
        Sign in to continue
    </p>

    <input 
        id="username"
        type="text"
        placeholder="Username"
        class="w-full border p-2 mb-3 rounded"
    >

    <input 
        id="password"
        type="password"
        placeholder="Password"
        class="w-full border p-2 mb-4 rounded"
    >

    <button
        onclick="login()" 
        class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700"
    >
        Sign In
    </button>

    <p class="text-sm text-gray-500 mt-4 text-center">
        Demo: admin / admin123
    </p>

</div>

<div id="mainPage" class="hidden p-6">

    <!--Navbar-->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
        <div class="flex gap-2">
            <input id= "searchInput" type="text" placeholder="search issue"
                class="input input-bordered w-64"/>
            <button class="btn btn-primary">Search</button>

        </div>
    </div>

    <!--Tab-->

    <div class="flex gap-4 mb-6">
        <button class="btn btn-sm tabBtn" onclick="loadIssues('all')">All</button>
        <button class="btn btn-sm tabBtn" onclick="loadIssues('open')">Open</button>
        <button class="btn btn-sm tabBtn" onclick="loadIssues('closed')">Closed</button>
    </div>
    
    <!--Issues Grid-->
    <div id="issuesCounter" 
        class= "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
    </div>
    
</div>


<script src ="script.js"></script>
    
</body>
</html>
